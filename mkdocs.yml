site_name: FirePro3D
site_description: Fire protection sprinkler system design and analysis tool

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: red
      accent: orange

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - Overview: architecture/overview.md
    - Entities: architecture/entities.md
    - Display System: architecture/display-system.md
    - Level System: architecture/level-system.md
    - Analysis: architecture/analysis.md
    - I/O: architecture/io.md
    - Refactoring Candidates: architecture/refactoring.md
  - Contributing:
    - Guide: contributing/guide.md
    - Adding Entities: contributing/adding-entities.md
    - Adding Tools: contributing/adding-tools.md
  - API Reference: reference/
